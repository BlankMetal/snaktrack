<section class="over-budget-override" data-over-budget-override hidden>
  <div>
    <p class="eyebrow">Budget Variance Confirmation</p>
    <h2>Over-Budget Snack Approval</h2>
  </div>
  <p class="override-message" data-override-message>
    This exceeds Derek Ashford snack budget of $10.00 by $16.00.
  </p>
  <label class="override-confirmation">
    <input type="checkbox" data-override-confirmation />
    Approve this over-budget snack request.
  </label>
  <div class="override-actions">
    <button class="reject-button" type="button" data-modal-action="reject">
      Reject Request
    </button>
    <button class="approve-button" type="button" data-override-action>
      Approve (with override)
    </button>
  </div>
</section>
